services:
  backend:
    build:
      context: ./backend
    env_file:
      - ../config/db.env
      - ../config/oss.env
      - ../config/llm.env
    environment:
      APP_ENV: production
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
