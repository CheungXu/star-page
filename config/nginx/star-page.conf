# Nginx 站点配置模板（与服务器 /etc/nginx/sites-available/star-page 保持同步）
# 共享 location 片段：/etc/nginx/snippets/star-page-locations.conf

# HTTP：域名统一跳转到 https://stars-page.com
server {
    listen 80;
    listen [::]:80;
    server_name stars-page.com www.stars-page.com;
    return 301 https://stars-page.com$request_uri;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    client_max_body_size 60m;
    include snippets/star-page-locations.conf;
}

# HTTPS：www 统一跳转到根域
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.stars-page.com;
    client_max_body_size 60m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://stars-page.com$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name stars-page.com;
    client_max_body_size 60m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include snippets/star-page-locations.conf;
}
