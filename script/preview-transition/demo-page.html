<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora 智能助手 · 产品介绍</title>
    <style>
      /* 原型预览用的占位「生成结果页」，模拟一个简洁高级的产品介绍 landing */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #ffffff;
        line-height: 1.6;
      }
      .hero {
        padding: 88px 64px 72px;
        background:
          radial-gradient(1200px 500px at 20% -10%, rgba(53, 99, 233, 0.16), transparent 60%),
          radial-gradient(1000px 480px at 100% 0%, rgba(139, 92, 246, 0.14), transparent 55%),
          #f8fafc;
      }
      .eyebrow {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(53, 99, 233, 0.1);
        color: #3563e9;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      h1 {
        margin: 22px 0 0;
        font-size: 56px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.08;
        max-width: 760px;
      }
      .lead {
        margin: 22px 0 0;
        max-width: 620px;
        font-size: 20px;
        color: #475569;
      }
      .cta {
        margin-top: 36px;
        display: inline-flex;
        gap: 14px;
      }
      .btn {
        padding: 14px 28px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
      }
      .btn-primary { background: #3563e9; color: #fff; }
      .btn-ghost { background: #fff; color: #0f172a; border: 1px solid rgba(15, 23, 42, 0.12); }
      .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 64px;
      }
      .card {
        padding: 32px;
        border-radius: 18px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: #fff;
        box-shadow: 0 18px 40px -28px rgba(15, 23, 42, 0.3);
      }
      .card .ico {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 26px;
        background: linear-gradient(135deg, #eaf0ff, #f5f0ff);
      }
      .card h3 { margin: 20px 0 8px; font-size: 22px; font-weight: 700; }
      .card p { color: #64748b; font-size: 15.5px; }
      .scenes {
        padding: 24px 64px 88px;
      }
      .scenes h2 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
      .scene-row { display: flex; gap: 16px; margin-top: 28px; flex-wrap: wrap; }
      .pill {
        padding: 12px 22px;
        border-radius: 999px;
        background: #f1f5f9;
        color: #334155;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <span class="eyebrow">AURORA · 面向客户的智能助手</span>
      <h1>把复杂的产品价值，讲成一句话就懂。</h1>
      <p class="lead">
        从资料到成稿，Aurora 帮你在几分钟内生成简洁、高级、可分享的产品介绍页，让每一次沟通都直击要点。
      </p>
      <div class="cta">
        <a class="btn btn-primary" href="#">免费开始</a>
        <a class="btn btn-ghost" href="#">预约演示</a>
      </div>
    </section>

    <section class="features">
      <div class="card">
        <div class="ico">⚡</div>
        <h3>极速成稿</h3>
        <p>上传资料，自动梳理信息架构，一键产出结构清晰的介绍页。</p>
      </div>
      <div class="card">
        <div class="ico">🎯</div>
        <h3>卖点聚焦</h3>
        <p>智能提炼三大核心卖点，弱化噪音，让客户一眼锁定价值。</p>
      </div>
      <div class="card">
        <div class="ico">🔗</div>
        <h3>即刻分享</h3>
        <p>生成可分享链接，随时在手机与桌面端呈现一致的精致体验。</p>
      </div>
    </section>

    <section class="scenes">
      <h2>典型适用场景</h2>
      <div class="scene-row">
        <span class="pill">新品发布</span>
        <span class="pill">客户提案</span>
        <span class="pill">招商加盟</span>
        <span class="pill">活动落地页</span>
        <span class="pill">投资人沟通</span>
      </div>
    </section>
  </body>
</html>
